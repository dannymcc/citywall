name: Build APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Needed so the tag build can publish a GitHub Release with the APK asset.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Provides Gradle directly so no committed wrapper jar is needed.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      # Build the debug variant: it's signed with the debug keystore, so it's
      # installable for sideload without managing release signing secrets.
      - name: Build debug APK
        env:
          # Monotonic versionCode so each published APK installs as an update.
          CITYWALL_VERSION_CODE: ${{ github.run_number }}
          CITYWALL_VERSION_NAME: ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}
        run: gradle assembleDebug --no-daemon

      # Give the asset a clean, stable name so releases/latest/download resolves.
      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk citywall-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: citywall-debug-apk
          path: citywall-debug.apk

      # On a version tag, publish the APK to the Releases page.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: citywall-debug.apk
